    <div class="container"><h1><code>-</code> and <code>-=</code> Operators</h1>
<p><code>-</code> subtracts the second <a href="/type:Int.html"><code>Int</code></a> value from the first. For <a href="/type:Float.html"><code>Float</code></a> values, see <a href="/operator:minusdot.html"><code>-.</code></a>.</p>
<div class="snippet"><pre><code>3 <span class="operator">-</span> 1 <span class="comment">//-&gt; 2</span>
1 <span class="operator">-</span> 10 <span class="comment">//-&gt; -9</span></code></pre><button class="run-snippet">Run</button><button class="edit-snippet">Edit</button><div class="snippet-output" hidden></div></div>
<p>You can use <code>-=</code> to subtract and assign to a variable.</p>
<div class="snippet"><pre><code><a class="keyword" href="/keyword:let.html">let</a> i <a class="operator" href="/operator:=.html">=</a> 3
i <a class="operator" href="/operator:-=.html">-=</a> 1
i <span class="comment">//-&gt; 2</span></code></pre><button class="run-snippet">Run</button><button class="edit-snippet">Edit</button><div class="snippet-output" hidden></div></div></div>

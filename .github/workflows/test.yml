on:
  push:
    branches: [main]
  pull_request:

name: CI

jobs:
  test_linux:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0

      - name: Build binary for assert_cmd
        run: cargo build

      - run: cargo test

  formatting:
    name: Check formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Check CSS formatting
        run: npx prettier --check "website/**/style.css"

      - name: Check TS formatting
        run: npx prettier --check "website/**/*.ts"

  actionlint:
    name: Actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: ls
      - uses: raven-actions/actionlint@v2

  build_docs:
    name: Build documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: extractions/setup-just@v2

      - name: Build Garden
        run: cargo build --release

      - name: Add Garden to PATH
        run: echo "$GITHUB_WORKSPACE/target/release" >> "$GITHUB_PATH"

      - name: Build website
        run: just site-build

      - name: Run code blocks in markdown files
        run: |
          failed=0
          : > /tmp/run-code-blocks-failures.md
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            if ! out=$(garden run-code-blocks "$f" 2>&1); then
              echo "$out"
              echo "FAIL: $f"
              {
                echo "### $f"
                echo ''
                echo '```'
                echo "$out"
                echo '```'
                echo ''
              } >> /tmp/run-code-blocks-failures.md
              echo "::error file=$f::run-code-blocks failed for $f"
              failed=1
            else
              echo "$out"
            fi
            echo "::endgroup::"
          done < <(find . -name '*.md' -not -path './target/*' -not -path './node_modules/*' -not -path './src/test_files/*' -not -path './CHANGELOG.md' -not -path './sample_programs/ambiguities.md' -print0)
          if [ "$failed" -ne 0 ]; then
            {
              echo "## run-code-blocks failures"
              echo ''
              cat /tmp/run-code-blocks-failures.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$failed"


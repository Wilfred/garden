on:
  push:
    branches: [main]
  pull_request:

name: CI

jobs:
  test_linux:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0

      - name: Build binary for assert_cmd
        run: cargo build

      - run: cargo test

  formatting:
    name: Check formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Check CSS formatting
        run: npx prettier --check "website/**/style.css"

      - name: Check TS formatting
        run: npx prettier --check "website/**/*.ts"

      - name: Build Garden
        run: cargo build

      - name: Check Garden formatting
        run: |
          status=0
          while IFS= read -r -d '' f; do
            if ! ./target/debug/garden format --check "$f"; then
              status=1
            fi
          done < <({
            find src website sample_programs benchmarks -name '*.gdn' -not -path '*/test_files/*' -not -path '*/unit_test_files/*' -print0
            find src/test_files/eval_up_to -name '*.gdn' -print0
          })
          exit "$status"

  typos:
    name: Check spelling
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  actionlint:
    name: Actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            actions:
              - '.github/**'
      - if: steps.filter.outputs.actions == 'true'
        uses: raven-actions/actionlint@v2

  build_docs:
    name: Build documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: extractions/setup-just@v2

      - name: Build Garden
        run: cargo build --release

      - name: Add Garden to PATH
        run: echo "$GITHUB_WORKSPACE/target/release" >> "$GITHUB_PATH"

      - name: Build website
        run: just site-build

  check_sample_programs:
    name: Check sample programs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0

      - name: Build Garden
        run: cargo build --release

      - name: Run garden check on sample programs
        run: |
          status=0
          for f in sample_programs/*.gdn; do
            echo "=== $f ==="
            ./target/release/garden check "$f" || status=1
          done
          exit $status

